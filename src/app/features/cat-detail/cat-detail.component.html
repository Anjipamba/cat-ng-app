<div class="header-actions">
  <button mat-icon-button (click)="goBack()" aria-label="Go back">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <h1 class="mat-headline-2">Cat Details</h1>
  <div class="spacer"></div>
</div>

@if (store.loading()) {
  <div class="loading-shade">
    <mat-spinner></mat-spinner>
  </div>
}

@if (store.error()) {
  <mat-card appearance="outlined" class="error-card">
    <mat-card-content class="error-content">
      <mat-icon color="warn">error</mat-icon>
      <span>{{ store.error() }}</span>
    </mat-card-content>
  </mat-card>
}

@if (!store.loading() && store.currentCat()) {
  @let cat = store.currentCat()!;
  
  <mat-card appearance="outlined" class="detail-card">
    <div class="card-hero mat-sys-primary-container">
      <mat-icon class="hero-icon">pets</mat-icon>
    </div>
    
    <mat-card-header class="content-header">
      <mat-card-title class="mat-display-1">{{ cat.name }}</mat-card-title>
      <mat-card-subtitle class="mat-headline-5 text-muted">Age: {{ cat.age }}</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content class="content-body">
      <h3 class="mat-headline-6">About</h3>
      <p class="mat-body-1">{{ cat.description }}</p>
    </mat-card-content>
    
    <mat-card-actions align="end" class="action-buttons">
      <button mat-flat-button color="warn" (click)="deleteCat(cat.id)">
        <mat-icon>delete</mat-icon> Delete
      </button>
      <button mat-flat-button color="primary" [routerLink]="['/cat', cat.id, 'edit']">
        <mat-icon>edit</mat-icon> Edit Cat
      </button>
    </mat-card-actions>
  </mat-card>
}
